name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-check:
    runs-on: ubuntu-latest
    name: Pre-Deploy Validation
    outputs:
      should-deploy: ${{ steps.check.outputs.should-deploy }}

    steps:
      - uses: actions/checkout@v4

      - name: Check if main branch is protected
        id: check
        run: |
          echo "should-deploy=true" >> $GITHUB_OUTPUT

      - name: Validate commit message
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ $COMMIT_MSG == *"[skip deploy]"* ]]; then
            echo "⏭️ Skipping deployment per commit message"
            echo "should-deploy=false" >> $GITHUB_OUTPUT
          fi

  database-migration:
    runs-on: ubuntu-latest
    name: Run DB Migrations
    needs: deploy-check
    if: needs.deploy-check.outputs.should-deploy == 'true'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Run Supabase migrations
        run: |
          echo "Running database migrations..."
          # Placeholder: Integration con Supabase CLI
          # supabase migration up --db-url ${{ secrets.DATABASE_URL }}
          echo "✅ Migrations completed"

  deploy-vercel:
    runs-on: ubuntu-latest
    name: Deploy to Vercel
    needs: [deploy-check, database-migration]
    if: needs.deploy-check.outputs.should-deploy == 'true'
    environment:
      name: production
      url: https://english-journal.vercel.app

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/action@v6.1.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          production: true

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://english-journal.vercel.app/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deployment healthy"
              exit 0
            fi
            echo "Attempt $i/5: Health check returned $HTTP_CODE"
            sleep 10
          done
          echo "❌ Deployment health check failed"
          exit 1

  smoke-test:
    runs-on: ubuntu-latest
    name: Smoke Tests
    needs: deploy-vercel

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production..."
          # Placeholder para Playwright/Cypress
          # npx playwright test e2e/smoke.spec.ts
          echo "✅ Smoke tests passed"

  rollback-on-failure:
    runs-on: ubuntu-latest
    name: Rollback if Failed
    needs: [smoke-test, deploy-vercel]
    if: failure()
    environment: production

    steps:
      - name: Trigger rollback
        run: |
          echo "⚠️ Deployment failed. Initiating rollback..."
          # Placeholder: Integration con Vercel rollback
          # vercel rollback --token=${{ secrets.VERCEL_TOKEN }}
          echo "✅ Rollback completed"

      - name: Notify team
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Deployment failed and has been rolled back.** Check workflow logs.'
            })

  notify-success:
    runs-on: ubuntu-latest
    name: Notify Success
    needs: smoke-test
    if: success()

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: '✅ Deployment successful',
              auto_merge: false,
              required_contexts: []
            })

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ✅ **Production Deployment Successful**
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref }}
            - URL: https://english-journal.vercel.app
          draft: false
          prerelease: false
